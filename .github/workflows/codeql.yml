name: CodeQL

# Free static security analysis (GitHub code scanning) for the Python code. Results appear in the
# repo's Security tab. The C firmware isn't analysed here: CodeQL would need to build it under the
# Zephyr / ESP-IDF toolchains, which isn't practical in this workflow.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
