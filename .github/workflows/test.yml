name: tests

on:
  push:
  pull_request:

jobs:
  python:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install pytest pytest-cov pandas numpy
      - name: Run pytest with coverage
        run: >
          python -m pytest app/dashboard/tests app/firebase/functions/tests -v
          --cov --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false      # never fail the build on a coverage-upload hiccup
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  firmware:
    name: Collar logic unit tests (C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run host C tests
        run: make -C firmware/test check
