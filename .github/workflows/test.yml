name: tests

on:
  push:
  pull_request:

jobs:
  python:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install pytest pandas numpy
      - name: Run pytest
        run: python -m pytest app/dashboard/tests app/firebase/functions/tests -v

  firmware:
    name: Collar logic unit tests (C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run host C tests
        run: make -C firmware/test check
