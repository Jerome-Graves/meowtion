# Lets Streamlit serve the static JS front door (static/account.html) from the
# SAME origin as this Python dashboard, so a login cookie is shared between them.
[server]
enableStaticServing = true

# Brand accent + font only. We deliberately do NOT pin base/background/secondary/text colours:
# fully specifying the theme makes Streamlit hide the in-app theme switcher (the ⋮ menu loses
# "Settings"), which stops users choosing light or dark. With only the accent set, the switcher
# stays available and defaults to light. The brand background gradient is applied via CSS in
# theme.py (brand_header), and our charts/widgets adapt to the chosen theme via is_dark().
[theme]
primaryColor = "#bc7bc2"
font = "sans serif"
