# Meowtion collar (Zephyr / nRF Connect SDK)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y            # connectable: a central (station/phone) connects to stream audio
CONFIG_BT_DEVICE_NAME="Meowtion Collar"
CONFIG_LOG=y

# Throughput for the audio notify stream: bigger ATT MTU + link-layer data length.
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_GATT_AUTO_UPDATE_MTU=y
# The 8 kHz stream is ~17 KB/s. At 1 packet per connection event the link sat just under that and
# slowly dropped frames. Queue several packets per event (more TX buffers; the controller's event-RX
# count must stay above the ACL-TX count) and enable 2M PHY (half the airtime per packet) so the
# drain rate clears the audio rate with margin. Station requests 2M after connecting.
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_BUF_EVT_RX_COUNT=12
CONFIG_BT_CTLR_PHY_2M=y

# USB CDC ACM console + the MEOW> id banner, on the LEGACY USB device stack.
# The board's default backend uses the new (NEXT) USB stack, whose CDC console doesn't deliver
# console output on this build (the port enumerates but stays silent). So we disable the board
# backend and bring up a single legacy CDC ACM ourselves (see app.overlay + usb_enable() in
# main). The legacy stack's console poll_out buffers reliably, which is what we need.
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Meowtion Collar"
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Real battery sensing: ADC (SAADC) on AIN7 + GPIO to gate the divider (see app.overlay).
CONFIG_ADC=y
CONFIG_GPIO=y

# Onboard PDM microphone (XIAO Sense) for audio capture.
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# Onboard IMU (LSM6DS3TR-C on i2c0, driven by Zephyr's lsm6dsl driver). Sampled alongside each
# audio clip to produce paired training data, and fed to the classifier cascade. Polled (no trigger).
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y
# The IMU sensor node is marked zephyr,deferred-init (overlay) so its init runs from imu_init()
# in main , after the power rail is up , instead of at boot where it raced the rail and failed.
